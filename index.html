<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Process | Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff; /* Het witte scherm */
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .video-container {
            width: 75%; /* Het kleinere kader in het midden */
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background: #000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); /* Subtiele diepte */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .portfolio-button {
            margin-top: 50px;
            padding: 16px 32px;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s ease;
        }
        .portfolio-button:hover {
            background-color: #444;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe 
            src="https://player.vimeo.com/video/1171579329?autoplay=1&loop=1&autopause=0&muted=1&background=1" 
            allow="autoplay; fullscreen" 
            allowfullscreen>
        </iframe>
    </div>

    <a href="portfolio.html" class="portfolio-button">View Full Portfolio</a>

</body>
</html>
